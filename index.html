<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRN WARN | Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle,
                rgba(255, 59, 48, 0.18) 0%,
                rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,.08);
            color: #ff453a;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: clamp(42px,6vw,68px);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(180deg,#ffffff 0%,#d1d1d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: clamp(18px,2.5vw,24px);
            color: #8e8e93;
            max-width: 600px;
            line-height: 1.6;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            color: #48484a;
            font-size: 12px;
            letter-spacing: .5px;
        }
    </style>
</head>
<body>

<div class="glow"></div>

<div class="content">
    <div class="badge">In Entwicklung</div>

    <h1>WRN WARN.</h1>

    <p>
        Die moderne Warn-App für Deutschland.<br>
        Offizielle Warnungen, schnelle Informationen und
        zuverlässige Benachrichtigungen – bald verfügbar.
    </p>
</div>

<div class="footer">
    © 2026 WRN. Alle Rechte vorbehalten.
</div>

</body>
</html>
