<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRN Analytics | Coming Soon</title>
    <style>
        /* Apple-Style CSS Reset */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Tiefes Schwarz */
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtiles, wissenschaftliches Leuchten im Hintergrund */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.12) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* Der 'Kommt bald' Tag */
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            color: #a1a1a6;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Hauptüberschrift */
        h1 {
            font-size: clamp(40px, 6vw, 64px); /* Passt sich ans Handy an */
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Untertitel */
        p {
            font-size: clamp(18px, 2.5vw, 24px);
            color: #86868b;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Footer unten in der Mitte */
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: #424245;
            z-index: 1;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="content">
        <div class="badge">In Entwicklung</div>
        <h1>WRN Analytics.</h1>
        <p>Präzise Datenerfassung. Wissenschaftliche Analyse. Kommt bald.</p>
    </div>

    <div class="footer">
        &copy; 2026 WRN. Alle Rechte vorbehalten.
    </div>

</body>
</html>
