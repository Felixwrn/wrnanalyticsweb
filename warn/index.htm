<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WRN WARN | Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.glow{
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,
        rgba(255,59,48,.35),
        transparent 70%);
    filter:blur(40px);
    animation:pulse 6s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}

.container{
    position:relative;
    z-index:10;
    text-align:center;
    padding:30px;
    max-width:900px;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    border-radius:50px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    color:#ff453a;
    margin-bottom:30px;
}

h1{
    font-size:70px;
    margin-bottom:15px;
    letter-spacing:-2px;
}

.subtitle{
    color:#9f9fa6;
    font-size:22px;
    margin-bottom:60px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.box{
    width:140px;
    padding:25px;
    border-radius:22px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
}

.number{
    font-size:52px;
    font-weight:700;
}

.label{
    margin-top:8px;
    color:#8e8e93;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:2px;
}

.footer{
    margin-top:70px;
    color:#6e6e73;
}

@media(max-width:700px){

h1{
font-size:52px;
}

.box{
width:120px;
}

.number{
font-size:42px;
}

.subtitle{
font-size:18px;
}

}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="badge">
Geplant für Q4 2026
</div>

<h1>WRN WARN.</h1>

<div class="subtitle">
Die moderne Warn-App für Deutschland.
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">--</div>
<div class="label">Tage</div>
</div>

<div class="box">
<div class="number" id="hours">--</div>
<div class="label">Stunden</div>
</div>

<div class="box">
<div class="number" id="minutes">--</div>
<div class="label">Minuten</div>
</div>

<div class="box">
<div class="number" id="seconds">--</div>
<div class="label">Sekunden</div>
</div>

</div>

<div class="footer">
© 2026 WRN. Alle Rechte vorbehalten.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "DEINE_API_KEY",

authDomain: "DEIN_PROJEKT.firebaseapp.com",

projectId: "DEIN_PROJEKT",

storageBucket: "DEIN_PROJEKT.appspot.com",

messagingSenderId: "123456789",

appId: "DEINE_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let releaseDate;

async function loadCountdown(){

const snapshot = await getDoc(doc(db,"website","countdown"));

if(snapshot.exists()){

releaseDate = snapshot.data().releaseDate.toDate();

startCountdown();

}else{

console.log("Countdown nicht gefunden.");

}

}

function startCountdown(){

setInterval(()=>{

const now = new Date();

const distance = releaseDate-now;

if(distance<=0){

document.getElementById("days").textContent="0";
document.getElementById("hours").textContent="0";
document.getElementById("minutes").textContent="0";
document.getElementById("seconds").textContent="0";

return;

}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").textContent=days;
document.getElementById("hours").textContent=hours;
document.getElementById("minutes").textContent=minutes;
document.getElementById("seconds").textContent=seconds;

},1000);

}

loadCountdown();

</script>

</body>
</html>
