<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRN | Coming Soon</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}
.bg{
position:fixed;
inset:0;
background:#000;
z-index:-2;
}
.glow{
position:absolute;
left:50%;
top:35%;
width:900px;
height:900px;
transform:translate(-50%,-50%);
background:radial-gradient(circle,rgba(255,59,48,.20),transparent 70%);
filter:blur(70px);
animation:pulse 8s ease-in-out infinite;
}
@keyframes pulse{
0%,100%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.15)}
}
nav{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.06);
}
nav a{color:#bbb;text-decoration:none;margin-left:20px}
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:120px 20px 60px;
}
.badge{
display:inline-block;
padding:8px 16px;
border-radius:999px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.05);
color:#ff6b60;
margin-bottom:25px;
}
h1{
font-size:clamp(72px,10vw,140px);
letter-spacing:-5px;
background:linear-gradient(#fff,#bcbcbc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.subtitle{
margin-top:20px;
font-size:clamp(20px,3vw,28px);
color:#aaa;
max-width:700px;
margin-inline:auto;
line-height:1.6;
}
.countdown{
margin-top:60px;
display:grid;
grid-template-columns:repeat(4,150px);
gap:18px;
justify-content:center;
}
.box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
backdrop-filter:blur(16px);
}
.num{font-size:48px;font-weight:700}
.lab{margin-top:6px;color:#999;text-transform:uppercase;font-size:12px;letter-spacing:2px}
.note{margin-top:50px;color:#888}
footer{
padding:40px;
text-align:center;
color:#666;
border-top:1px solid rgba(255,255,255,.06)
}
@media(max-width:720px){
.countdown{
grid-template-columns:repeat(2,140px);
}
}
</style>
</head>
<body>

<div class="bg"><div class="glow"></div></div>

<nav>
<div><strong>WRN</strong></div>
<div>
<a href="#">Home</a>
<a href="#">Projekte</a>
</div>
</nav>

<section class="hero">
<div>
<div class="badge">Geplant für Q4 2026</div>

<h1>WRN WARN.</h1>

<p class="subtitle">
Die moderne Warn-App für Deutschland.
Offizielle Warnungen für Unwetter, Hochwasser,
Bevölkerungsschutz und Erdbeben.
</p>

<div class="countdown">
<div class="box"><div class="num" id="days">--</div><div class="lab">Tage</div></div>
<div class="box"><div class="num" id="hours">--</div><div class="lab">Stunden</div></div>
<div class="box"><div class="num" id="minutes">--</div><div class="lab">Minuten</div></div>
<div class="box"><div class="num" id="seconds">--</div><div class="lab">Sekunden</div></div>
</div>

<p class="note" id="status">Countdown wird geladen …</p>
</div>
</section>

<footer>© 2026 WRN. Alle Rechte vorbehalten.</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcTSv_WWwkarezW45kmy74xBChGHaOMHc",
  authDomain: "wrn-warn.firebaseapp.com",
  projectId: "wrn-warn",
  storageBucket: "wrn-warn.firebasestorage.app",
  messagingSenderId: "307358512846",
  appId: "1:307358512846:web:5d5339fa016a719649029f",
  measurementId: "G-WV3M3D5TT1"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getFirestore(app);

let releaseDate=null;

async function loadCountdown(){
  try{
    const snap = await getDoc(doc(db,"website","countdown"));
    if(!snap.exists()){
      document.getElementById("status").textContent="Firestore-Dokument website/countdown nicht gefunden.";
      return;
    }
    const data=snap.data();
    if(!data.releaseDate){
      document.getElementById("status").textContent="Feld releaseDate fehlt.";
      return;
    }
    releaseDate=data.releaseDate.toDate();
    document.getElementById("status").textContent="Veröffentlichung geplant für Q4 2026";
    update();
    setInterval(update,1000);
  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="Fehler beim Laden aus Firestore.";
  }
}

function update(){
  const diff=releaseDate-new Date();
  if(diff<=0){
    document.getElementById("days").textContent="0";
    document.getElementById("hours").textContent="0";
    document.getElementById("minutes").textContent="0";
    document.getElementById("seconds").textContent="0";
    document.getElementById("status").textContent="Jetzt verfügbar!";
    return;
  }
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);

  days.textContent=d;
  hours.textContent=String(h).padStart(2,"0");
  minutes.textContent=String(m).padStart(2,"0");
  seconds.textContent=String(s).padStart(2,"0");
}

loadCountdown();
</script>

</body>
</html>
